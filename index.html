<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💬 دردشة خفيفة</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
    body {
      background: #0f0c29;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
    }
    .chat {
      width: 100%;
      max-width: 500px;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(20px);
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.1);
      height: 90vh;
      max-height: 680px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      padding: 18px 22px;
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { color: #fff; font-size: 18px; }
    .header span { color: #a78bfa; font-size: 12px; background: rgba(167,139,250,0.15); padding: 4px 14px; border-radius: 30px; }
    .msgs {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .msgs::-webkit-scrollbar { width: 4px; }
    .msgs::-webkit-scrollbar-thumb { background: #6b5b9e; border-radius: 10px; }
    .msg {
      padding: 8px 14px;
      border-radius: 16px;
      max-width: 85%;
      word-wrap: break-word;
      font-size: 14px;
      line-height: 1.4;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .msg.self { background: #7c3aed; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg.other { background: rgba(255,255,255,0.08); color: #e5e7eb; align-self: flex-start; border-bottom-left-radius: 4px; }
    .msg.system { background: rgba(167,139,250,0.1); color: #c4b5fd; align-self: center; text-align: center; font-size: 12px; padding: 4px 16px; border-radius: 30px; max-width: 95%; }
    .msg .name { font-size: 11px; font-weight: 600; color: #a78bfa; display: block; margin-bottom: 2px; }
    .msg .time { font-size: 9px; opacity: 0.4; margin-right: 6px; }
    .input-area {
      padding: 12px 16px 16px;
      background: rgba(255,255,255,0.03);
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .row { display: flex; gap: 8px; }
    .row input {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 30px;
      background: rgba(255,255,255,0.07);
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    .row input::placeholder { color: rgba(255,255,255,0.3); }
    .row input:focus { background: rgba(255,255,255,0.12); }
    .row button {
      padding: 10px 20px;
      border: none;
      border-radius: 30px;
      background: #7c3aed;
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }
    .row button:hover { opacity: 0.9; }
    .row button:active { transform: scale(0.96); }
    .name-row { display: flex; gap: 8px; align-items: center; }
    .name-row label { color: rgba(255,255,255,0.4); font-size: 12px; }
    .name-row input {
      flex: 1;
      padding: 6px 12px;
      border: none;
      border-radius: 30px;
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 12px;
      outline: none;
    }
    .name-row button { padding: 6px 14px; font-size: 11px; background: rgba(167,139,250,0.2); color: #a78bfa; border: none; border-radius: 30px; cursor: pointer; }
    .status { color: rgba(255,255,255,0.25); font-size: 11px; text-align: center; padding: 2px 0; }
  </style>
</head>
<body>
<div class="chat">
  <div class="header"><h1>💬 دردشة</h1><span>🟢 مباشر</span></div>
  <div class="msgs" id="msgs"></div>
  <div class="input-area">
    <div class="name-row">
      <label>👤</label>
      <input id="nameInput" placeholder="اسمك" maxlength="20" />
      <button id="nameBtn">تغيير</button>
    </div>
    <div class="row">
      <input id="msgInput" placeholder="اكتب رسالتك..." />
      <button id="sendBtn">إرسال</button>
    </div>
    <div class="status" id="status">🔄 جاري الاتصال...</div>
  </div>
</div>
<script>
const msgs = document.getElementById('msgs');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const nameInput = document.getElementById('nameInput');
const nameBtn = document.getElementById('nameBtn');
const statusDiv = document.getElementById('status');

let ws = null;
let myName = 'زائر';

function connect() {
  ws = new WebSocket('ws://localhost:8080');
  
  ws.onopen = () => { statusDiv.textContent = '🟢 متصل'; statusDiv.style.color = 'rgba(167,139,250,0.7)'; };
  
  ws.onmessage = (e) => {
    try { addMsg(JSON.parse(e.data)); } catch(_) {}
  };
  
  ws.onclose = () => {
    statusDiv.textContent = '🔴 انقطع - إعادة محاولة...';
    statusDiv.style.color = 'rgba(244,63,94,0.7)';
    setTimeout(connect, 2000);
  };
  
  ws.onerror = () => { ws.close(); };
}

function addMsg(d) {
  const div = document.createElement('div');
  div.className = 'msg';
  if (d.type === 'system') { div.classList.add('system'); div.textContent = d.text; }
  else if (d.type === 'message') {
    div.classList.add(d.name === myName ? 'self' : 'other');
    const t = d.timestamp ? new Date(d.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
    div.innerHTML = `<span class="name">${d.name}</span>${d.text}<span class="time">${t}</span>`;
  }
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function sendMsg() {
  const t = msgInput.value.trim();
  if (!t) return;
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'message', text: t }));
    msgInput.value = '';
    msgInput.focus();
  }
}

function changeName() {
  const n = nameInput.value.trim();
  if (n && n !== myName && ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'setName', name: n }));
    myName = n;
    statusDiv.textContent = `👤 أنت: ${myName}`;
    nameInput.value = '';
  }
}

sendBtn.onclick = sendMsg;
msgInput.onkeydown = (e) => { if (e.key === 'Enter') sendMsg(); };
nameBtn.onclick = changeName;
nameInput.onkeydown = (e) => { if (e.key === 'Enter') changeName(); };

connect();
</script>
</body>
</html>
