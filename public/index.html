<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>دردشة عربية</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: #f0f4f8; height: 100vh; display: flex; justify-content: center; align-items: center; }
    .app { width: 100%; max-width: 500px; height: 100vh; background: #fff; display: flex; flex-direction: column; }
    .login { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; padding: 40px; }
    .login h1 { color: #1e293b; font-size: 28px; margin-bottom: 8px; }
    .login input { width: 100%; max-width: 300px; padding: 16px; border: 2px solid #e2e8f0; border-radius: 16px; font-size: 16px; text-align: center; }
    .login button { width: 100%; max-width: 300px; padding: 16px; background: #3b82f6; color: #fff; border: none; border-radius: 16px; font-size: 18px; font-weight: 600; cursor: pointer; margin-top: 12px; }
    .login .error { color: #ef4444; font-size: 13px; margin-top: 12px; display: none; }
    .chat { display: none; flex-direction: column; height: 100%; }
    .chat.active { display: flex; }
    .header { padding: 14px 18px; background: #fff; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { color: #1e293b; font-size: 18px; }
    .status-bar { padding: 4px 18px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; font-size: 12px; color: #94a3b8; }
    .messages { flex: 1; padding: 12px 16px; overflow-y: auto; background: #f8fafc; }
    .msg { padding: 10px 16px; border-radius: 18px; max-width: 88%; margin-bottom: 6px; }
    .msg.self { background: #3b82f6; color: #fff; align-self: flex-end; margin-left: auto; }
    .msg.other { background: #fff; color: #1e293b; border: 1px solid #e2e8f0; }
    .msg.system { background: #f1f5f9; color: #94a3b8; text-align: center; font-size: 12px; max-width: 100%; }
    .input-area { padding: 10px 16px 14px; background: #fff; border-top: 1px solid #e2e8f0; display: flex; gap: 10px; }
    .input-area input { flex: 1; padding: 12px 18px; border: 2px solid #e2e8f0; border-radius: 30px; font-size: 15px; }
    .input-area button { padding: 12px 22px; background: #3b82f6; color: #fff; border: none; border-radius: 30px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .messages { display: flex; flex-direction: column; }
  </style>
</head>
<body>
<div class="app">
  <div class="login" id="loginScreen">
    <h1>💬 دردشة عربية</h1>
    <p style="color:#94a3b8;margin-bottom:32px;">أدخل اسمك للانضمام</p>
    <input type="text" id="loginName" placeholder="اسمك...">
    <button id="loginBtn">دخول</button>
    <div class="error" id="loginError">الرجاء إدخال اسم صحيح</div>
  </div>
  <div class="chat" id="chatScreen">
    <div class="header"><h1>💬 دردشة عربية</h1></div>
    <div class="status-bar" id="statusText">🔄 جاري الاتصال...</div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <input type="text" id="msgInput" placeholder="اكتب رسالتك...">
      <button id="sendBtn">إرسال</button>
    </div>
  </div>
</div>
<script>
const loginScreen = document.getElementById('loginScreen');
const loginName = document.getElementById('loginName');
const loginBtn = document.getElementById('loginBtn');
const loginError = document.getElementById('loginError');
const chatScreen = document.getElementById('chatScreen');
const messages = document.getElementById('messages');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const statusText = document.getElementById('statusText');

let ws = null;
let myName = '';

loginBtn.onclick = () => {
  const name = loginName.value.trim();
  if (!name || name.length < 2) { loginError.style.display = 'block'; return; }
  loginError.style.display = 'none';
  myName = name;
  loginScreen.style.display = 'none';
  chatScreen.classList.add('active');
  connect();
};

function connect() {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${protocol}//${location.host}`);
  ws.onopen = () => { statusText.textContent = '✅ متصل'; ws.send(JSON.stringify({ type: 'setName', name: myName })); };
  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (data.type === 'system') {
        const div = document.createElement('div'); div.className = 'msg system'; div.textContent = data.text; messages.appendChild(div);
      } else if (data.type === 'public') {
        const div = document.createElement('div'); div.className = 'msg ' + (data.sender === myName ? 'self' : 'other');
        div.innerHTML = `<b>${data.sender}</b>: ${data.text}`; messages.appendChild(div);
      }
      messages.scrollTop = messages.scrollHeight;
    } catch(_) {}
  };
  ws.onclose = () => { statusText.textContent = '❌ غير متصل'; setTimeout(connect, 3000); };
}

sendBtn.onclick = () => {
  const text = msgInput.value.trim();
  if (!text) return;
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'message', text }));
    msgInput.value = '';
  }
};
msgInput.onkeydown = (e) => { if (e.key === 'Enter') sendBtn.click(); };
</script>
</body>
</html>
